# Digital Leap GPOMS — local development stack.
#   docker compose up --build           # full stack
#   docker compose up db pgadmin        # database infrastructure only

services:
  db:
    image: postgres:16-alpine
    container_name: gpoms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gpoms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpoms_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-gpoms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gpoms_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gpoms} -d ${POSTGRES_DB:-gpoms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: gpoms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@digitalleap.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local   # offline wheel install for local dev (Render uses the online Dockerfile)
    container_name: gpoms_backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-gpoms}:${POSTGRES_PASSWORD:-gpoms_dev_password}@db:5432/${POSTGRES_DB:-gpoms}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me-please-generate-a-real-one}
      BACKEND_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: gpoms_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_PORT:-8000}/api"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  gpoms_db_data:
