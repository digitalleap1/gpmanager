# Render Blueprint for the GPOMS backend API.
# Create the service: Render Dashboard -> New -> Blueprint -> pick this repo.
# Set the `sync: false` env vars in the dashboard after the first apply.
#
# The database is Neon (external managed Postgres) per the project plan — paste
# its pooled connection string into DATABASE_URL (use the postgresql+psycopg://
# scheme). You can alternatively uncomment the `databases:` block to let Render
# provision Postgres instead of Neon.

services:
  - type: web
    name: gpoms-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    # NOTE: migrations + seed run automatically at container startup (see
    # backend/Dockerfile CMD), so no preDeploy hook or Render Shell is required —
    # the free tier comes up fully provisioned (schema + admin/roles/permissions).
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # Neon connection string: postgresql+psycopg://USER:PASS@HOST/DB?sslmode=require
      - key: BACKEND_CORS_ORIGINS
        sync: false # your Vercel URL, e.g. https://gpmanager.vercel.app
      - key: FIRST_ADMIN_EMAIL
        sync: false
      - key: FIRST_ADMIN_PASSWORD
        sync: false

